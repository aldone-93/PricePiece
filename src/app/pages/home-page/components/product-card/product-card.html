<div class="m-product-card" (click)="onCardClick()">
  <h4>{{ name() }}</h4>
  <div class="o-cardImage">
    <div class="m-priceInfo">
      @let sign = (diff() ?? 0) !== 0 ? ((diff() ?? 0) >= 0 ? 'positive' : 'negative') : '';
      <div class="a-prices">
        <a
          href="https://www.cardmarket.com/en/OnePiece/Products?idProduct={{ id() }}"
          target="_blank"
          (click)="$event.stopPropagation()"
          >🇮🇹: {{ minIta() | currency }}</a
        >
        <a
          href="https://www.cardmarket.com/en/OnePiece/Products?idProduct={{ id() }}"
          target="_blank"
          (click)="$event.stopPropagation()"
          >🇪🇺: {{ minEu() | currency }}</a
        >
      </div>

      <div class="a-cmLogo">
        <img src="assets/icons/cardmarket.svg" />
      </div>
    </div>

    @defer (on viewport) {
      <img
        [class.visible]="imageLoaded()"
        (load)="imageLoaded.set(true)"
        src="https://onepiece-images.s3.eu-north-1.amazonaws.com/images/{{ id() }}_SMALL.jpg"
        alt="{{ name() }}"
        (error)="$event.target.src = 'assets/images/back.png'"
      />
    } @placeholder {
      <img src="assets/images/back.png" />
    }
  </div>
  @if (diff()) {
    <div class="m-cardInfo">
      <div class="a-links">
        <p [ngClass]="sign">{{ diff() | number: '1.0-2' }}%</p>
        <a
          href="https://www.cardtrader.com/en/cards/{{ ctrader_id() }}"
          target="_blank"
          (click)="$event.stopPropagation()"
        >
          CardTrader
        </a>
      </div>
    </div>
  }
</div>
