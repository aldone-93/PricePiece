<div class="m-product-card" (click)="onCardClick()">
  <h4>{{ name() }}</h4>
  <div class="o-cardImage">
    <div class="m-priceInfo">
      @let sign = diff() !== 0 ? (diff() >= 0 ? 'positive' : 'negative') : '';
      <div class="a-prices">
        <a
          href="https://www.cardmarket.com/en/OnePiece/Products?idProduct={{ id() }}"
          target="_blank"
          (click)="$event.stopPropagation()"
          >🇮🇹: {{ minIta() | currency }}</a
        >
        <a
          href="https://www.cardmarket.com/en/OnePiece/Products?idProduct={{ id() }}"
          target="_blank"
          (click)="$event.stopPropagation()"
          >🇪🇺: {{ minEu() | currency }}</a
        >
      </div>

      <div class="a-cmLogo">
        <img src="assets/icons/cardmarket.svg" />
      </div>
    </div>
    <img
      src="https://res.cloudinary.com/dntnvwjka/image/upload/{{ id() }}_SMALL.jpg"
      alt="{{ name() }}"
    />
  </div>
  <div class="m-cardInfo">
    <div class="a-links">
      <p [ngClass]="sign">{{ diff() | number: '1.0-2' }}%</p>
      <a
        href="https://www.cardtrader.com/en/cards/{{ ctrader_id() }}"
        target="_blank"
        (click)="$event.stopPropagation()"
      >
        CardTrader
      </a>
    </div>
  </div>
</div>
