@if (totalPages() > 1) {
  <nav class="m-pagination">
    <button
      class="a-page-btn a-prev"
      [disabled]="!hasPrev()"
      (click)="prev()"
      aria-label="Pagina precedente"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>

    @for (page of pages(); track $index) {
      @if (page === '...') {
        <span class="a-ellipsis">…</span>
      } @else {
        <button class="a-page-btn" [class.active]="page === currentPage()" (click)="goTo(page)">
          {{ page }}
        </button>
      }
    }

    <button
      class="a-page-btn a-next"
      [disabled]="!hasNext()"
      (click)="next()"
      aria-label="Pagina successiva"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </button>
  </nav>
}
